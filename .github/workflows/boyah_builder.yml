name: Boyah Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      releases_branch:
        description: "Select the releases branch"
        required: false
        default: "openwrt:25.12.0"
        type: choice
        options:
          - openwrt:25.12.0
          - openwrt:24.10.5
          - immortalwrt:25.12.0
          - immortalwrt:24.10.4
      openwrt_board:
        description: "Select device board"
        required: false
        default: "s905x-b860h"
        type: choice
        options:
          - s905
          - s905x
          - s905x-b860h
          - s905x2-hg680fj
          - s905x3
          - s912
          - s922x
   
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "6.6.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ribel13/kernel"
        type: choice
        options:
          - ophub/kernel
          - ribel13/kernel
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
      openwrt_ip:
        description: "Set OpenWrt default IP address."
        required: false
        default: "192.168.1.1"
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "FRDMX"
        type: choice
        options:
          - ophub
          - angel
          - FRDMX

env:
  TZ: Etc/UTC
  IMAGEBUILDER_SH: config/imagebuilder/frdmx.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build Firmware Images
        id: build
        if: steps.customize.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}
          mkdir -p compiled_images
          chmod +x frdmx.sh

          if [ "${{ env.CLEAN }}" == "true" ]; then
            make clean
          fi
            
          time ./frdmx.sh ${{ env.PROFILE }} ${{ env.TUNNEL }}
            
          for file in bin/targets/"${{ env.TARGET_SYSTEM }}"/*-rootfs.tar.gz; do
            if [ -f "$file" ]; then
              new_name="FRDMX_$(basename "$file" -rootfs.tar.gz)_${{ env.TUNNEL }}-rootfs.tar.gz"
              mv "$file" compiled_images/$new_name
            fi
          done

          echo "Images built successfully:"
          ls -la compiled_images/
          echo "status=success" >> "$GITHUB_OUTPUT"
      
  download:
    name: Download Rootfs
    runs-on: ubuntu-latest
    steps:
      - name: Download Rootfs
        run: |
          wget "${{ github.event.inputs.rootfs_url }}"
          ROOTFS_PATH=$(find ./ -name "*rootfs.tar.gz")
          echo "ROOTFS_PATH=$ROOTFS_PATH" >> $GITHUB_ENV
          
      - name: Upload Rootfs
        uses: actions/upload-artifact@v4
        with:
          name: amlogic-rootfs
          path: |
            ${{ env.ROOTFS_PATH }}

  build_specific:
    name: Build ${{ github.event.inputs.board_version }}
    runs-on: ubuntu-22.04
    needs: download
    if: github.event.inputs.board_version != 'all'
    steps:
      - name: Clone Amlogic Builder
        run: |
          if [ -d "amlogic-s9xxx-openwrt" ]; then
            rm -rf amlogic-s9xxx-openwrt
          fi
          git clone --depth 1 https://github.com/ribel13/aml.git
          mkdir -p amlogic-s9xxx-openwrt/openwrt-armsr
    
      - name: Download Rootfs
        uses: actions/download-artifact@v4
        with:
          name: amlogic-rootfs
          path: ./amlogic-s9xxx-openwrt/openwrt-armsr/
          # path: ./Action_ImmortalWrt/releases/download/2026.03.06-0017/openwrt-armsr
          
      - name: Build Firmware ${{ github.event.inputs.board_version }} with Kernel ${{ github.event.inputs.kernel_version }}
        run: |
          cd amlogic-s9xxx-openwrt
          sudo ./remake -b ${{ github.event.inputs.board_version }} -k ${{ github.event.inputs.kernel_version }} -s ${{ github.event.inputs.rootfs_size }}
      
      - name: Find Firmware
        run: |
          FILE_PATH=$(find ./amlogic-s9xxx-openwrt/openwrt/out/ -name "*.img.gz")
          if [[ -z "$FILE_PATH" ]]; then
            echo "Error: Tidak ada file firmware ditemukan!"
            exit 1
          fi
          echo "FILE_PATH=$FILE_PATH" >> $GITHUB_ENV

      - name: Set up date
        id: set_date
        run: |
          export TZ='Asia/Jakarta'
          echo "date_time=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.AKSI_GITHUB }}
        with:
          name: FRDMX-Wrt ${{ github.event.inputs.openwrt_ver }}
          tag_name: v${{ github.event.inputs.openwrt_ver }}_k${{ github.event.inputs.kernel_version }}
          draft: false
          prerelease: false
          files: |
                ${{ env.FILE_PATH }}
          body: |
            ### Information
            * Default IP: 192.168.1.1
            * Default username: frdmx

  build_all:
    name: Build All
    runs-on: ubuntu-22.04
    needs: download
    if: github.event.inputs.board_version == 'all'
    strategy:
      matrix:
        board_version: 
          - h96-max-m2
          - nanopi-r5c
          - nanopi-r5s
          - orangepi-5-plus
          - rk3318-box
          - s905-beelink-mini
          - s905-mxqpro-plus
          - s905l-b860av21u
          - s905w
          - s905x2
          - s905x3
          - s905x3-h96max
          - s905x3-x96max
          - s912
          - s912-nexbox-a1
          - s912-nexbox-a2
          - s922x
          - tanix-tx6
    steps:
      - name: Clone Amlogic Builder
        run: |
          if [ -d "amlogic-s9xxx-openwrt" ]; then
            rm -rf amlogic-s9xxx-openwrt
          fi
          git clone --depth 1 https://github.com/ribel13/aml.git
          mkdir -p amlogic-s9xxx-openwrt/openwrt-armsr
    
      - name: Download Rootfs
        uses: actions/download-artifact@v4
        with:
          name: amlogic-rootfs
          path: ./amlogic-s9xxx-openwrt/openwrt-armsr/
          
      - name: Build Firmware ${{ matrix.board_version }} with Kernel ${{ github.event.inputs.kernel_version }}
        run: |
          cd amlogic-s9xxx-openwrt/
          sudo ./remake -b ${{ matrix.board_version }} -k ${{ github.event.inputs.kernel_version }} -s ${{ github.event.inputs.rootfs_size }}
      
      - name: Find Firmware
        run: |
          FILE_PATH=$(find ./amlogic-s9xxx-openwrt/openwrt/out/ -name "*.img.gz")
          if [[ -z "$FILE_PATH" ]]; then
            echo "Error: Tidak ada file firmware ditemukan!"
            exit 1
          fi
          echo "FILE_PATH=$FILE_PATH" >> $GITHUB_ENV

      - name: Set up date
        id: set_date
        run: |
          export TZ='Asia/Jakarta'
          echo "date_time=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.AKSI_GITHUB }}
        with:
          name: FRDM-Wrt ${{ github.event.inputs.openwrt_ver }}
          tag_name: v${{ github.event.inputs.openwrt_ver }}_k${{ github.event.inputs.kernel_version }}
          draft: false
          prerelease: false
          files: |
                ${{ env.FILE_PATH }}
          body: |
            ### FRDMX-Wrt Information
            * Default IP: 192.168.1.1
            * Default username: frdmx
